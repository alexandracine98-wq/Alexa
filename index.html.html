<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menguante Agencia — Redes sociales para cine y cultura</title>
  <meta name="description" content="Agencia creativa especializada en estrategia de redes sociales para películas, festivales, teatros y producciones culturales." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #FF4D6D;
      --yellow: #FFE566;
      --ink: #1a1a1a;
      --cream: #FEFBF4;
      --mint: #B8F5E0;
      --lav: #D4C8FF;
      --muted: #555;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2.5rem;
      border-bottom: 2px solid var(--ink);
      background: var(--cream);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-decoration: none;
    }

    .logo span {
      background: var(--red);
      color: #fff;
      padding: 2px 6px;
      margin-left: 4px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--red); }

    .lang-switcher {
      display: flex;
      border: 2px solid var(--ink);
      overflow: hidden;
    }

    .lang-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.35rem 0.75rem;
      letter-spacing: 0.08em;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--ink);
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .lang-btn.active { background: var(--ink); color: var(--cream); }
    .lang-btn:not(.active):hover { background: var(--yellow); }

    /* ── HERO ── */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 88vh;
      border-bottom: 2px solid var(--ink);
    }

    .hero-left {
      padding: 4rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 2px solid var(--ink);
    }

    .hero-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1.2rem;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 4vw, 4rem);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 1.5rem;
    }

    .hero-title em { font-style: italic; color: var(--red); }

    .hero-desc {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }

    .btn-primary {
      background: var(--ink);
      color: var(--cream);
      padding: 0.75rem 1.8rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      border: 2px solid var(--ink);
      cursor: pointer;
      transition: all 0.18s;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary:hover { background: var(--red); border-color: var(--red); }

    .btn-outline {
      background: transparent;
      color: var(--ink);
      padding: 0.75rem 1.8rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      border: 2px solid var(--ink);
      cursor: pointer;
      transition: all 0.18s;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
    }

    .btn-outline:hover { background: var(--yellow); }

    .hero-right {
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .film-strip { display: flex; flex-direction: column; gap: 0.5rem; }
    .film-row { display: flex; gap: 0.5rem; }

    .film-cell {
      width: 70px;
      height: 70px;
      border: 2px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      background: var(--cream);
      transition: transform 0.2s;
      cursor: default;
    }

    .film-cell:hover { transform: scale(1.08); }
    .film-cell.pink  { background: var(--red); }
    .film-cell.dark  { background: var(--ink); color: var(--yellow); font-family: 'Space Mono', monospace; font-size: 1.4rem; }
    .film-cell.mint  { background: var(--mint); }
    .film-cell.lav   { background: var(--lav); }

    .hero-stats { display: flex; gap: 2rem; margin-top: 1.5rem; }

    .hero-stat { font-family: 'Space Mono', monospace; text-align: center; }
    .hero-stat-num { font-size: 2.5rem; font-weight: 700; color: var(--ink); line-height: 1; }
    .hero-stat-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #666; margin-top: 0.25rem; }

    /* ── SECTIONS ── */
    section { border-bottom: 2px solid var(--ink); }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      padding: 2.5rem 2.5rem 0;
      margin-bottom: 2rem;
    }

    .section-num { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--red); letter-spacing: 0.1em; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; }

    /* ── ABOUT ── */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; }

    .about-text { padding: 2rem 2.5rem 3rem; border-right: 2px solid var(--ink); }
    .about-text p { font-size: 1rem; color: #444; line-height: 1.8; margin-bottom: 1rem; }
    .about-text p strong { color: var(--ink); }

    .about-highlights { padding: 2rem 2.5rem 3rem; display: flex; flex-direction: column; gap: 1.2rem; }

    .highlight-pill {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border: 2px solid var(--ink);
      background: var(--cream);
    }

    .pill-emoji { font-size: 1.4rem; }
    .pill-text { font-size: 0.9rem; font-weight: 500; color: var(--ink); }
    .pill-sub { font-size: 0.78rem; color: #777; margin-top: 2px; }

    .hp-pink   { background: #FFEEF2; border-color: var(--red); }
    .hp-yellow { background: #FFFCE5; }
    .hp-mint   { background: #EDFFF7; }

    /* ── PORTFOLIO ── */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 2px solid var(--ink);
    }

    .project-card { border-right: 2px solid var(--ink); padding-bottom: 1.5rem; cursor: pointer; }
    .project-card:nth-child(3n)  { border-right: none; }
    .project-card:nth-child(n+4) { border-top: 2px solid var(--ink); }

    .project-card:hover .card-thumb { opacity: 0.85; }

    .card-thumb {
      height: 180px;
      border-bottom: 2px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      transition: opacity 0.18s;
    }

    .ct-1 { background: #FF4D6D; } .ct-2 { background: #FFE566; } .ct-3 { background: #D4C8FF; }
    .ct-4 { background: #B8F5E0; } .ct-5 { background: #FFD4B8; } .ct-6 { background: #C8E8FF; }

    .card-body { padding: 1.2rem 1.2rem 0; }
    .card-tag { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); margin-bottom: 0.4rem; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .card-desc { font-size: 0.82rem; color: #666; line-height: 1.6; }

    /* ── SERVICES ── */
    .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); border-top: 2px solid var(--ink); }

    .service-item { padding: 2rem 2.5rem; border-right: 2px solid var(--ink); border-bottom: 2px solid var(--ink); }
    .service-item:nth-child(2n)      { border-right: none; }
    .service-item:nth-last-child(-n+2) { border-bottom: none; }

    .service-icon { width: 48px; height: 48px; border: 2px solid var(--ink); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin-bottom: 1rem; }
    .si-pink   { background: var(--red); }
    .si-yellow { background: var(--yellow); }
    .si-lav    { background: var(--lav); }
    .si-mint   { background: var(--mint); }

    .service-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.6rem; }
    .service-desc  { font-size: 0.88rem; color: var(--muted); line-height: 1.7; }

    .service-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .stag { font-family: 'Space Mono', monospace; font-size: 0.64rem; letter-spacing: 0.06em; padding: 3px 8px; border: 1.5px solid var(--ink); background: var(--cream); text-transform: uppercase; }

    /* ── CONTACT ── */
    .contact-grid { display: grid; grid-template-columns: 1fr 1.2fr; border-top: 2px solid var(--ink); }

    .contact-left { padding: 2.5rem 2.5rem 3rem; border-right: 2px solid var(--ink); background: var(--red); }
    .contact-left .section-title { color: #FEFBF4; }
    .contact-left .section-num   { color: var(--yellow); }

    .contact-slogan { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3rem; color: #FEFBF4; margin: 1rem 0 1.5rem; line-height: 1.5; }
    .contact-desc   { font-size: 0.9rem; color: rgba(255,255,255,0.8); line-height: 1.7; }

    .contact-social { display: flex; flex-direction: column; gap: 0.8rem; margin-top: 2rem; }

    .social-link {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: #FEFBF4;
      text-decoration: none;
      letter-spacing: 0.05em;
      padding: 0.7rem 1rem;
      border: 2px solid rgba(255,255,255,0.4);
      transition: background 0.16s;
    }

    .social-link:hover { background: rgba(255,255,255,0.15); }

    .contact-right { padding: 2.5rem 2.5rem 3rem; }

    .form-group { margin-bottom: 1.2rem; }

    .form-label { display: block; font-family: 'Space Mono', monospace; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 0.4rem; }

    .form-input { width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--ink); background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--ink); outline: none; transition: border-color 0.16s; }
    .form-input:focus { border-color: var(--red); }
    textarea.form-input { resize: vertical; min-height: 100px; }

    .btn-send { background: var(--ink); color: var(--cream); padding: 0.85rem 2.2rem; font-family: 'Space Mono', monospace; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; border: 2px solid var(--ink); cursor: pointer; text-transform: uppercase; transition: all 0.18s; width: 100%; margin-top: 0.5rem; }
    .btn-send:hover { background: var(--red); border-color: var(--red); }

    /* ── FOOTER ── */
    footer { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2.5rem; background: var(--ink); color: var(--cream); }
    .footer-logo { font-family: 'Space Mono', monospace; font-size: 0.82rem; font-weight: 700; }
    .footer-copy { font-size: 0.78rem; color: #888; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.2rem; flex-wrap: wrap; gap: 0.8rem; }
      .nav-links { display: none; }
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-right { min-height: 320px; }
      .hero-left { padding: 2.5rem 1.5rem; border-right: none; border-bottom: 2px solid var(--ink); }
      .about-grid, .contact-grid { grid-template-columns: 1fr; }
      .about-text { border-right: none; border-bottom: 2px solid var(--ink); }
      .contact-left { border-right: none; border-bottom: 2px solid var(--ink); }
      .portfolio-grid { grid-template-columns: 1fr; }
      .project-card { border-right: none !important; border-top: 2px solid var(--ink); }
      .project-card:first-child { border-top: none; }
      .services-grid { grid-template-columns: 1fr; }
      .service-item { border-right: none !important; }
      .section-header { padding: 2rem 1.5rem 0; }
      .about-text, .about-highlights, .contact-right { padding: 1.5rem; }
      .contact-left { padding: 1.5rem; }
    }
  </style>
</head>
<body>
